operators:
  - type: concat
    target: cmd_vel_pose
    sources:
      - cmd_vel
      - cmd_height
      - cmd_pitch
      - cmd_roll

  - type: affine
    source: joint_pos
    target: joint_pos_rel
    mean: [0, 0.8, -1.5, 0, 0.8, -1.5, 0, 0.8, -1.5, 0, 0.8, -1.5]

  - type: affine
    source: joint_vel
    target: joint_vel_rel
    mean: 0.0
